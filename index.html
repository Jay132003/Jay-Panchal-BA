<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Jay Panchal - Business Analyst and Solutions Engineer specializing in workflow automation." />
    <title>Jay Panchal | Business Analyst & Solutions Engineer</title>
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/favicon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

    <!-- Apply saved theme before first paint to prevent colour flash -->
    <script>
      try {
        var t = localStorage.getItem('jay-theme');
        if (t === 'dark' || (!t && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
          document.documentElement.classList.add('dark');
        }
      } catch (e) {}
    </script>

    <!-- Static splash — visible before React loads, prevents white blink -->
    <style>
      #splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 20px;
        background: #fafafa;
      }
      html.dark #splash { background: #111111; }

      #splash-mark {
        width: 46px;
        height: 46px;
        display: grid;
        place-items: center;
        background: #111111;
        color: #fafafa;
        border-radius: 13px;
        font-family: Inter, system-ui, sans-serif;
        font-size: 14px;
        font-weight: 700;
        letter-spacing: -0.03em;
        animation: sp-pop 550ms cubic-bezier(0.34, 1.56, 0.64, 1) both;
      }
      html.dark #splash-mark { background: #f3f3f3; color: #111111; }

      #splash-dots { display: flex; gap: 5px; }
      #splash-dots span {
        width: 5px;
        height: 5px;
        border-radius: 50%;
        background: #858585;
        animation: sp-dot 1s ease-in-out infinite;
      }
      #splash-dots span:nth-child(2) { animation-delay: 0.13s; }
      #splash-dots span:nth-child(3) { animation-delay: 0.26s; }

      @keyframes sp-pop {
        from { opacity: 0; transform: scale(0.75); }
        to   { opacity: 1; transform: scale(1); }
      }
      @keyframes sp-dot {
        0%, 60%, 100% { transform: translateY(0);    opacity: 0.35; }
        30%           { transform: translateY(-7px); opacity: 1; }
      }
    </style>
  </head>
  <body>
    <!-- Static splash rendered before React — zero blink on load/refresh -->
    <div id="splash">
      <div id="splash-mark">JP</div>
      <div id="splash-dots"><span></span><span></span><span></span></div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
